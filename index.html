<!DOCTYPE html>
<html>
<head><title>PathPlanner Right/Left Reflector</title></head>
<body>
<h2>PathPlanner Path Right/Left Reflector</h2>
<p>Upload a <code>.path</code> file to reflect it over the horizontal midline (y = fieldWidth / 2).</p>
<p>For REBUILT, the Welded field width is 8.069 meters, and the AndyMark field width is 8.043 meters.</p>
<label>Field Width (m): <input type="number" id="fieldWidth" value="8.069" step="0.01"></label>
<br><br>
<input type="file" id="fileInput" accept=".path,.json">
<br><br>
<button id="downloadBtn" disabled>Download Reflected Path</button>
<pre id="output" style="max-height:600px;overflow:auto;background:#f4f4f4;padding:10px;"></pre>

<script>
let reflected = null;

document.getElementById('fileInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      const fieldWidth = parseFloat(document.getElementById('fieldWidth').value);
      reflected = reflectPath(data, fieldWidth);
      document.getElementById('output').textContent = JSON.stringify(reflected, null, 2);
      document.getElementById('downloadBtn').disabled = false;
    } catch (err) {
      document.getElementById('output').textContent = 'Error: ' + err.message;
    }
  };
  reader.readAsText(file);
});

document.getElementById('downloadBtn').addEventListener('click', function() {
  if (!reflected) return;
  const blob = new Blob([JSON.stringify(reflected, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'reflected_path.path';
  a.click();
});

function reflectY(point, fieldWidth) {
  if (!point) return null;
  return { x: point.x, y: fieldWidth - point.y };
}

function reflectPath(data, fieldWidth) {
  const out = JSON.parse(JSON.stringify(data)); // deep clone

  // Reflect waypoints
  out.waypoints = out.waypoints.map(wp => ({
    ...wp,
    anchor: reflectY(wp.anchor, fieldWidth),
    prevControl: wp.prevControl ? reflectY(wp.prevControl, fieldWidth) : null,
    nextControl: wp.nextControl ? reflectY(wp.nextControl, fieldWidth) : null
  }));

  // Negate rotation targets
  if (out.rotationTargets) {
    out.rotationTargets = out.rotationTargets.map(rt => ({
      ...rt,
      rotationDegrees: -rt.rotationDegrees
    }));
  }

  // Negate goal end state rotation
  if (out.goalEndState) {
    out.goalEndState.rotation = -out.goalEndState.rotation;
  }

  // Negate ideal starting state rotation
  if (out.idealStartingState) {
    out.idealStartingState.rotation = -out.idealStartingState.rotation;
  }

  return out;
}
</script>
</body>
</html>
